name: Mobile CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Expo's cross-platform optional native dependencies are resolved
      # differently across npm versions/architectures. `npm install` keeps the
      # committed dependency graph while allowing npm to add the correct
      # platform-specific optional packages on the Linux runner.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npx expo config --type public
